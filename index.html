<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <title>Battery Charging</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      margin: 10px 0;
    }

    input[type=range] {
      width: 100%;
    }

    .card {
      background: #1f2937;
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .label {
      font-size: 12px;
      opacity: 0.7;
    }

    .big {
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="app">
  <h1>🔋 Fiido M1 Pro batteri</h1>

  <div class="label">Spänning (V)</div>
  <div class="value" id="voltageText">48.0V</div>

  <input id="slider" type="range" min="41" max="54.6" step="0.1">

  <div class="card">
    <div class="label">Uppskattad nivå</div>
    <div class="big" id="percent">--%</div>
  </div>

  <div class="card">
    <div class="label">Tid till 50%</div>
    <div class="big" id="to50">-- h</div>
  </div>

  <div class="card">
    <div class="label">Tid till 100%</div>
    <div class="big" id="to100">-- h</div>
  </div>
</div>

<script>
const slider = document.getElementById("slider");
const voltageText = document.getElementById("voltageText");

// restore last value
const saved = localStorage.getItem("voltage");
slider.value = saved ? saved : 48.0;

// Smooth battery curve using interpolation points
const curve = [
  {v: 41.5, p: 3},
  {v: 42.0, p: 5},
  {v: 44.5, p: 10},
  {v: 46.0, p: 20},
  {v: 47.5, p: 35},
  {v: 49.0, p: 50},
  {v: 50.5, p: 60},
  {v: 51.8, p: 75},
  {v: 53.0, p: 90},
  {v: 54.6, p: 100}
];

function batteryPercent(v) {
  if (v <= curve[0].v) return curve[0].p;
  if (v >= curve[curve.length - 1].v) return 100;

  for (let i = 0; i < curve.length - 1; i++) {
    const a = curve[i];
    const b = curve[i + 1];

    if (v >= a.v && v <= b.v) {
      const t = (v - a.v) / (b.v - a.v);
      return Math.round(a.p + t * (b.p - a.p));
    }
  }
  return 0;
}

function estimateTime(percent) {
  const fullHours = 6.2;

  const to100 = Math.max(0, (100 - percent) / 100 * fullHours);
  const to50 = percent >= 50 ? 0 : (50 - percent) / 100 * fullHours;

  return { to50, to100 };
}

function update(v) {
  v = parseFloat(v);
  if (isNaN(v)) return;

  localStorage.setItem("voltage", v);

  voltageText.textContent = v.toFixed(1) + "V";

  const percent = batteryPercent(v);
  const t = estimateTime(percent);

  document.getElementById("percent").textContent = percent + "%";
  document.getElementById("to50").textContent = t.to50.toFixed(2) + " h";
  document.getElementById("to100").textContent = t.to100.toFixed(2) + " h";
}

update(slider.value);
slider.addEventListener("input", (e) => update(e.target.value));
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/battery-charging/sw.js');
  }
</script>
</body>
</html>
